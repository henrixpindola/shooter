<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shooter Geometric - Jogo de Nave 2D</title>

    <!-- ===========================
       ESTILOS
  ============================ -->
    <link rel="stylesheet" href="/src/styles/styles.css" />
  </head>
  <body>
    <!-- ===========================
       CABEÇALHO
  ============================ -->
    <header class="header">
      <div class="header-logo">
        <img src="/assets/img/nave.png" alt="Nave Shooter" />
        <span>Shooter Geometric</span>
      </div>
      <nav class="header-nav">
        <a href="/" class="active">Jogo</a>
      </nav>
    </header>

    <!-- ===========================
       ÁREA PRINCIPAL DO JOGO
  ============================ -->
    <main class="canvas">
      <canvas width="450" height="450" id="canvas_animacao"></canvas>

      <!-- Controles -->
      <div class="controles">
        <button id="link_volume" class="controle-btn btn-volume">
          Áudio: on
        </button>
        <button id="link_pausar" class="controle-btn btn-pause">Pausar</button>
        <button id="link_sair" class="controle-btn btn-exit">Sair</button>
      </div>

      <!-- Botão central para iniciar -->
      <div class="playbtn-container">
        <button id="link_jogar" class="playbtn hidden">Começaaaar!</button>
        <button id="link_voltar" class="btn-voltar hidden">Voltar</button>
      </div>
    </main>

    <!-- ===========================
       SCRIPTS DO JOGO
  ============================ -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
